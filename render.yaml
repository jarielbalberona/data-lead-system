# Render Blueprint: one Python web service with a persistent disk for run artifacts.
# Deploy from the Render Dashboard via "New" -> "Blueprint" and select this repository.
# Persistent disks require a paid instance type (not the free web tier).
services:
  - type: web
    name: lead-system-demo
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: DATA_ROOT
        value: /var/data
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
